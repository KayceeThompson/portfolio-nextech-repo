    <div class="contact-section">
        <div style="text-align: left;">
            <h2>Let's Connect</h2>
            <p>Whether you want to collaborate, ask questions, or just say hello! <br><br>I'd still love to hear from you!</p>
        </div>
        <div class="row">
            <div class="column">
                <img src="avatar pics/cheeky avatar.png" alt="ThinkingAvatar">
            </div>
            <div class="column">
                <form action="mailto:anaiahkaycee@gmail.com" method="post" enctype="text/plain">
                    <strong for="name">Name</strong>
                    <br>
                    <input type="text" id="name" name="name" placeholder="Your name">
                    <br><br>
                    <strong for="email">Email</strong>
                    <br>
                    <input type="text" id="email" name="email" placeholder="Your email">
                    <br><br>
                    <strong for="message">Message</strong>
                    <br>
                    <textarea id="message" name="message" placeholder="Write your message"></textarea>
                    <br><br>
                    <input type="submit" value="Send Message"></input>
                </form>
            </div>
            <hr>
            <div class="contact-links">
                <h1>Get in Touch</h1>
                <p>Email: <a href="mailto:anaiahkaycee@gmail.com">anaiahkaycee@gmail.com</a></p>
                <p>GitHub: <a href="https://github.com/KayceeThompson">github.com/KayceeThompson</a></p>
            </div>
        </div>
